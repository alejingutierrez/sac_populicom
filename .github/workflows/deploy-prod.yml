name: deploy-prod

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace
        run: pnpm build

      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate

      - name: Deploy infrastructure
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          COGNITO_SAML_METADATA_URL: ${{ secrets.COGNITO_SAML_METADATA_URL }}
        run: pnpm --filter @sac/infra-cdk cdk deploy --require-approval never

      - name: Trigger Amplify production build
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        run: aws amplify start-job --app-id "$AMPLIFY_APP_ID" --branch-name main --job-type RELEASE

      - name: Smoke health check
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: curl --fail --silent --show-error "$PROD_URL/api/dashboard/summary"
