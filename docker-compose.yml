services:
  postgres:
    image: postgres:16-alpine
    container_name: sac-populicom-postgres
    environment:
      POSTGRES_DB: sac_populicom
      POSTGRES_PASSWORD: sac_populicom
      POSTGRES_USER: sac_populicom
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sac_populicom -d sac_populicom"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
